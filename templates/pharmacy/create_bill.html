{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <style>
        @media print {
            .d-print-none, .text-danger, #medSearch, .fas.fa-search-plus, h4.text-success { display: none !important; }
            .col-md-5 { display: none !important; }
            .col-md-7 { width: 100% !important; }
            #printableInvoice { border: none !important; box-shadow: none !important; padding: 0 !important; }
        }
    </style>

    <div class="row">
        <div class="col-md-5 d-print-none">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h4 class="mb-4 text-success fw-bold"><i class="fas fa-search-plus me-2"></i>Search Medicine</h4>
                <input type="text" id="medSearch" class="form-control rounded-pill mb-3 ps-4" placeholder="Type medicine name...">

                <div id="searchResults" class="list-group list-group-flush overflow-auto" style="max-height: 400px;">
                    {% for item in inventory %}
                    <button class="list-group-item list-group-item-action border-0 mb-2 rounded-4 search-item shadow-sm p-3"
                            onclick="addToBill('{{ item.id }}', '{{ item.medicine.name }}', '{{ item.medicine.price }}', '{{ item.stock_quantity }}')">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0 fw-bold">{{ item.medicine.name }}</h6>
                                <small class="text-muted">Stock: {{ item.stock_quantity }}</small>
                            </div>
                            <span class="badge bg-success-subtle text-success rounded-pill px-3">₹{{ item.medicine.price }}</span>
                        </div>
                    </button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-lg border-0 rounded-4 p-4 bg-white" id="printableInvoice">
                <div class="d-flex justify-content-between border-bottom pb-3 mb-4">
                    <div>
                        <h2 class="text-primary fw-bold mb-0">CityCare</h2>
                        <p class="text-muted small">Medical Pharmacy Invoice</p>
                    </div>
                    <div class="text-end">
                        <h5 class="fw-bold mb-0">INVOICE</h5>
                        <p class="mb-0 small fw-bold">Date: <span id="currentDate"></span></p>
                        <p class="mb-0 small text-muted">Time: <span id="currentTime"></span></p>
                    </div>
                </div>

                <table class="table table-borderless" id="billTable">
                    <thead class="bg-light">
                        <tr class="small text-uppercase text-muted">
                            <th>Medicine</th>
                            <th>Qty</th>
                            <th>Rate</th>
                            <th class="text-end">Total</th>
                            <th class="d-print-none"></th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>

                <div class="mt-4 pt-3 border-top">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="fw-bold">Grand Total:</h4>
                        <h3 class="text-primary fw-bold" id="grandTotal">₹0.00</h3>
                    </div>
                </div>

                <div class="mt-5 d-flex gap-2 justify-content-end d-print-none">
                    <button class="btn btn-outline-dark rounded-pill px-4" onclick="window.print()">
                        <i class="fas fa-print me-2"></i>Print Bill
                    </button>
                    <button class="btn btn-primary rounded-pill px-5 fw-bold" onclick="alert('Sale Completed!')">
                        Complete Sale
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let billItems = [];

// NEW: Date and Time Logic
function updateDateTime() {
    const now = new Date();
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
    const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
    document.getElementById('currentDate').innerText = now.toLocaleDateString('en-IN', dateOptions);
    document.getElementById('currentTime').innerText = now.toLocaleTimeString('en-IN', timeOptions);
}
updateDateTime(); // Call on load

// Real-time Search Logic
document.getElementById('medSearch').addEventListener('input', function(e) {
    let term = e.target.value.toLowerCase();
    document.querySelectorAll('.search-item').forEach(item => {
        let name = item.textContent.toLowerCase();
        item.style.display = name.includes(term) ? 'block' : 'none';
    });
});

// Add Item logic
function addToBill(id, name, price, stock) {
    let existing = billItems.find(i => i.id === id);
    if (existing) {
        if (existing.qty < stock) {
            existing.qty++;
        } else {
            alert("Insufficient stock!");
        }
    } else {
        billItems.push({ id, name, price: parseFloat(price), qty: 1 });
    }
    renderBill();
}

function renderBill() {
    let tbody = document.querySelector('#billTable tbody');
    tbody.innerHTML = '';
    let grandTotal = 0;

    billItems.forEach((item, index) => {
        let total = item.price * item.qty;
        grandTotal += total;
        tbody.innerHTML += `
            <tr class="align-middle">
                <td class="fw-bold">${item.name}</td>
                <td><span class="badge bg-light text-dark px-3 rounded-pill">${item.qty}</span></td>
                <td>₹${item.price}</td>
                <td class="text-end fw-bold">₹${total.toFixed(2)}</td>
                <td class="text-end d-print-none">
                    <button onclick="removeItem(${index})" class="btn btn-link text-danger p-0"><i class="fas fa-times-circle"></i></button>
                </td>
            </tr>`;
    });

    document.getElementById('grandTotal').innerText = '₹' + grandTotal.toFixed(2);
}

function removeItem(index) {
    billItems.splice(index, 1);
    renderBill();
}
</script>
{% endblock %}
